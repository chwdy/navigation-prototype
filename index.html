<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation Prototype — CS6750</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #00C8A0;
      --amber:  #F5A623;
      --danger: #E84040;
    }

    [data-theme="dark"] {
      --bg-body:       #0a0c10;
      --bg-panel:      #1A1D24;
      --bg-map:        #0D1018;
      --bg-road:       #1c2030;
      --bg-progress:   #141720;
      --bg-menu:       #22262f;
      --border:        rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.13);
      --text-primary:  #ffffff;
      --text-dim:      rgba(255,255,255,0.22);   /* non-essential elements */
      --lane-line:     rgba(255,255,255,0.55);
      --offroad:       #0a0d14;
      --switcher-bg:   rgba(255,255,255,0.04);
      --switcher-bd:   rgba(255,255,255,0.08);
    }

    [data-theme="light"] {
      --bg-body:       #dde1e8;
      --bg-panel:      #ffffff;
      --bg-map:        #bfc5d0;
      --bg-road:       #8f99aa;
      --bg-progress:   #d5dae3;
      --bg-menu:       #ffffff;
      --border:        rgba(0,0,0,0.07);
      --border-strong: rgba(0,0,0,0.13);
      --text-primary:  #141720;
      --text-dim:      rgba(0,0,0,0.22);
      --lane-line:     rgba(255,255,255,0.8);
      --offroad:       #aab2c0;
      --switcher-bg:   rgba(0,0,0,0.04);
      --switcher-bd:   rgba(0,0,0,0.08);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-body);
      font-family: 'Inter', sans-serif;
      padding: 24px 16px 20px;
      gap: 18px;
      transition: background 0.3s;
    }

    /* ══ PHONE ══ */
    #phone {
      width: 375px;
      height: 680px;
      background: var(--bg-panel);
      border-radius: 36px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 0 1px var(--border), 0 20px 70px rgba(0,0,0,0.5);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    /* ── NAV PANEL  30% = 204px ── */
    #nav-panel {
      height: 30%;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 16px 22px 12px;
      gap: 0;
      flex-shrink: 0;
      position: relative;
      transition: background 0.3s;
    }

    /* ---- primary row: icon + command ---- */
    #nav-primary {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
    }

    #turn-icon { width: 60px; height: 60px; flex-shrink: 0; }

    #command-block { flex: 1; min-width: 0; }

    /* THE essential instruction — huge, impossible to miss */
    #instruction-text {
      font-size: 38px;
      font-weight: 700;
      line-height: 1.1;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      transition: color 0.3s;
    }

    /* Distance tag — large mono, accent */
    #distance-readout {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--accent);
      margin-top: 4px;
    }

    /* ---- secondary row: all non-essential, heavily muted ---- */
    #nav-secondary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 11px;
      transition: color 0.3s;
    }

    /* Lane-change alert strip — amber, important */
    #lane-banner {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(245,166,35,0.14);
      border-top: 1.5px solid rgba(245,166,35,0.45);
      color: var(--amber);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 6px 18px;
      display: none;
      animation: slideUp 0.25s ease-out;
    }

    /* ── MAP SECTION ── */
    #map-section {
      flex: 1;
      display: flex;
      overflow: hidden;
      background: var(--bg-map);
      transition: background 0.3s;
    }

    #road-canvas {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #scene-svg { width: 100%; height: 100%; display: block; }

    #exit-sign {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: #1A6B3A;
      border: 2px solid rgba(255,255,255,0.9);
      color: #fff;
      border-radius: 6px;
      padding: 3px 14px;
      font-family: 'DM Mono', monospace;
      text-align: center;
      display: none;
      z-index: 10;
    }
    #exit-sign .exit-label  { font-size: 9px;  display: block; opacity: 0.75; }
    #exit-sign .exit-number { font-size: 19px; font-weight: 500; display: block; }

    /* ── VERTICAL PROGRESS BAR ── */
    #progress-bar-panel {
      width: 44px;
      background: var(--bg-progress);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 0 14px;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    /* Exit label — same size as the distance readout (22px DM Mono) */
    #progress-exit-label {
      width: 100%;
      font-size: 22px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      color: #4ade80;
      text-align: center;
      line-height: 1;
      flex-shrink: 0;
    }

    #progress-track-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;   /* column so track's flex:1 fills height, not width */
      align-items: center;
      width: 100%;
      padding: 4px 0;
    }

    /* Bar: teal from top = remaining distance; transparent below = already passed */
    #progress-track {
      width: 12px;
      flex: 1;                  /* in column context: expands vertically */
      background: transparent;
      border-radius: 6px;
      position: relative;
      overflow: hidden;
    }

    /* Remaining distance — bright teal, fills from top down to current position */
    #progress-ahead {
      position: absolute;
      top: 0; left: 0; width: 100%;
      background: var(--accent);
      border-radius: 6px;
      transition: height 0.5s ease-out;
    }

    /* ── BOTTOM ACTION BAR — all non-essential, muted ── */
    #bottom-bar {
      height: 50px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      transition: background 0.3s;
      position: relative;
    }

    /* Cancel and menu — greyed out, not distracting */
    #cancel-btn, #menu-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--border);
      font-size: 13px;
    }
    #cancel-btn:hover { background: rgba(232,64,64,0.1); color: var(--danger); border-color: rgba(232,64,64,0.3); }
    #menu-btn:hover   { background: var(--border); color: var(--text-primary); }

    /* ETA — slightly more visible but still not prominent */
    #eta-center {
      text-align: center;
    }
    #eta-center .eta-time {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dim);
      transition: color 0.3s;
    }
    #eta-center .eta-meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 1px;
      transition: color 0.3s;
    }

    /* ── POPUP MENU ── */
    #popup-menu {
      position: absolute;
      bottom: 46px; right: 12px;
      background: var(--bg-menu);
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 5px 0;
      min-width: 158px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.4);
      display: none;
      z-index: 100;
      transition: background 0.3s;
    }
    #popup-menu.open { display: block; animation: popIn 0.15s ease-out; }

    .menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 15px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, color 0.3s;
    }
    .menu-item:hover { background: var(--border); }
    .menu-item .mi { font-size: 14px; width: 18px; text-align: center; }
    .menu-divider { height: 1px; background: var(--border); margin: 3px 0; }

    /* ══ EXTERNAL PHASE SWITCHER ══ */
    #phase-switcher {
      width: 375px;
      background: var(--switcher-bg);
      border: 1px solid var(--switcher-bd);
      border-radius: 12px;
      padding: 11px 16px 13px;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #switcher-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 9px;
      font-family: 'DM Mono', monospace;
      transition: color 0.3s;
    }
    #phase-slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 3px;
      border-radius: 2px;
      background: var(--border-strong);
      outline: none; cursor: pointer;
      margin-bottom: 7px;
    }
    #phase-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px; height: 15px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg-body); cursor: pointer;
    }
    #phase-slider::-moz-range-thumb {
      width: 15px; height: 15px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg-body); cursor: pointer;
    }
    #phase-labels { display: flex; justify-content: space-between; }
    #phase-labels span {
      font-size: 10px; color: var(--text-dim);
      cursor: pointer; user-select: none; transition: color 0.2s;
    }
    #phase-labels span.active { color: var(--accent); font-weight: 600; }
    #phase-labels span:hover  { color: var(--text-primary); }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn  { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp { from { transform:translateY(100%); opacity:0; } to { transform:translateY(0); opacity:1; } }
    @keyframes popIn   { from { opacity:0; transform:scale(.93) translateY(3px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .phase-enter { animation: fadeIn 0.22s ease-out; }
  </style>
</head>
<body>

  <!-- ══ PHONE ══ -->
  <div id="phone">

    <!-- NAV PANEL (30%) -->
    <div id="nav-panel">
      <div id="nav-primary">
        <div id="turn-icon"></div>
        <div id="command-block">
          <div id="instruction-text">Stay in lane</div>
          <div id="distance-readout">1 mi</div>
        </div>
      </div>
      <div id="nav-secondary">
        <span>Via I-85 N</span>
        <span><span id="eta-dur">3 min</span> · 8.2 mi</span>
      </div>
      <div id="lane-banner"></div>
    </div>

    <!-- MAP -->
    <div id="map-section">
      <div id="road-canvas">
        <svg id="scene-svg" width="100%" height="100%"></svg>
        <div id="exit-sign">
          <span class="exit-label">Exit</span>
          <span class="exit-number">1A</span>
        </div>
      </div>
      <div id="progress-bar-panel">
        <div id="progress-exit-label">1A</div>
        <div id="progress-track-wrap">
          <div id="progress-track">
            <div id="progress-ahead"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM BAR — non-essential, muted -->
    <div id="bottom-bar">
      <div id="cancel-btn" title="Cancel">✕</div>
      <div id="eta-center">
        <div class="eta-time" id="eta-time">3:14 PM</div>
        <div class="eta-meta"><span id="eta-min">3 min</span> · 8.2 mi</div>
      </div>
      <div id="menu-btn" title="More">···</div>
      <div id="popup-menu">
        <div class="menu-item" id="theme-toggle">
          <span class="mi" id="theme-icon">☀️</span>
          <span id="theme-label">Light mode</span>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item"><span class="mi">🔇</span><span>Mute voice</span></div>
        <div class="menu-item"><span class="mi">↩</span><span>Alt routes</span></div>
      </div>
    </div>

  </div>

  <!-- ══ PHASE SWITCHER (not part of UI) ══ -->
  <div id="phase-switcher">
    <div id="switcher-label">Phase switcher — prototype control only</div>
    <input type="range" id="phase-slider" min="0" max="4" step="1" value="0">
    <div id="phase-labels">
      <span data-phase="0">1 mi ahead</span>
      <span data-phase="1">500 ft</span>
      <span data-phase="2">At exit</span>
      <span data-phase="3">Complex turn</span>
      <span data-phase="4">After turn</span>
    </div>
  </div>

  <script>
    // ── PHASE DATA ──────────────────────────────────────────────────────────
    // Short imperative commands — easy to read at a glance while driving
    const PHASES = [
      {
        id: 0,
        instruction: 'Stay in lane',
        distance: '1 mi',
        turnIconType: 'straight',
        bannerVisible: false,
        etaMin: '3 min',
        scene: 'highway',
        carLane: 1,
        routePath: 'straight',
        showExit: false,
        progressPct: 0.33,  // 1 mi to exit on 1.5 mi bar → 1/3 from bottom
      },
      {
        id: 1,
        instruction: 'Move right',
        distance: '500 ft',
        turnIconType: 'lane-right',
        bannerVisible: false,
        etaMin: '3 min',
        scene: 'highway',
        carLane: 1,
        routePath: 'curving-right',
        showExit: false,
        progressPct: 0.72,  // ~500 ft left of 1.5 mi
      },
      {
        id: 2,
        instruction: 'Take exit 1A',
        distance: 'Exit now',
        turnIconType: 'exit-right',
        bannerVisible: false,
        etaMin: '2 min',
        scene: 'highway',
        carLane: 2,
        routePath: 'onto-ramp',
        showExit: true,
        showExitLabel: true,
        progressPct: 0.95,  // nearly at exit
      },
      {
        id: 3,
        instruction: 'Turn right at the \u2461 exit',
        distance: '200 ft',
        turnIconType: 'turn-right',
        bannerVisible: false,
        etaMin: '1 min',
        scene: 'intersection',
        turnDirection: 'right',
        progressPct: 0.98,
        hideProgress: true,
      },
      {
        id: 4,
        instruction: 'Go straight',
        distance: '0.8 mi',
        turnIconType: 'straight',
        bannerVisible: false,
        etaMin: '1 min',
        scene: 'highway',
        carLane: 0,
        routePath: 'straight',
        showExit: false,
        progressPct: 0.33,
        hideProgress: true,
        singleLane: true,
      },
    ];

    // ── THEME ────────────────────────────────────────────────────────────────
    let isDark = true;
    document.getElementById('theme-toggle').addEventListener('click', () => {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      document.getElementById('theme-icon').textContent  = isDark ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent = isDark ? 'Light mode' : 'Dark mode';
      closeMenu();
      renderPhase(currentPhase);
    });

    // ── MENU ─────────────────────────────────────────────────────────────────
    const menuBtn    = document.getElementById('menu-btn');
    const popupMenu  = document.getElementById('popup-menu');
    menuBtn.addEventListener('click', e => { e.stopPropagation(); popupMenu.classList.toggle('open'); });
    function closeMenu() { popupMenu.classList.remove('open'); }
    document.addEventListener('click', closeMenu);
    popupMenu.addEventListener('click', e => e.stopPropagation());

    // ── SVG HELPERS ──────────────────────────────────────────────────────────
    const scene = document.getElementById('scene-svg');
    const NS = 'http://www.w3.org/2000/svg';
    function svgEl(tag, attrs) {
      const el = document.createElementNS(NS, tag);
      for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
      return el;
    }
    function add(el) { scene.appendChild(el); }
    function W() { return scene.clientWidth; }
    function H() { return scene.clientHeight; }
    function clearScene() { scene.innerHTML = ''; }
    const th = (d, l) => isDark ? d : l;

    // ── ROAD GEOMETRY ────────────────────────────────────────────────────────
    // Road geometry.
    // forExit=true: narrower road shifted left so the exit lane is fully visible
    // from the horizontal center of the canvas.
    function getRoad(forExit = false, singleLane = false) {
      const w = W(), h = H();
      const laneCount = singleLane ? 1 : 3;
      const baseRoadW = Math.round(w * (forExit ? 0.50 : 0.68));
      const roadW    = singleLane ? Math.round(baseRoadW / 3) : baseRoadW;
      const laneW    = roadW / laneCount;
      // forExit: anchor road to left edge so exit lane occupies right half
      const roadLeft  = forExit ? Math.round(w * 0.05) : Math.round((w - roadW) / 2);
      const roadRight = roadLeft + roadW;
      const shoulder  = 5;
      const laneCenters = Array.from({length: laneCount}, (_, i) => roadLeft + laneW * (i + 0.5));
      return { w, h, laneCount, roadW, laneW, roadLeft, roadRight, shoulder, laneCenters };
    }

    // ── DRAW ROAD SURFACE + THICK LANE LINES ─────────────────────────────────
    // exitDivY: when set, the right shoulder is drawn only from exitDivY→h (Part 1).
    // drawExitRamp will draw Part 2 (0→divY) and the fork geometry above.
    function drawRoad(r, exitDivY = null) {
      const { w, h, laneCount, roadW, laneW, roadLeft, roadRight, shoulder } = r;
      const roadColor  = th('#1c2030', '#8f99aa');
      const offColor   = th('#0a0d14', '#aab2c0');
      const lineColor  = th('rgba(255,255,255,0.58)', 'rgba(255,255,255,0.82)');
      const dashColor  = th('rgba(255,255,255,0.45)', 'rgba(255,255,255,0.65)');
      const lineW = 5;       // all lane lines thick
      const dashLen = 24, gapLen = 18;

      // Off-road
      add(svgEl('rect', { x:0, y:0, width:w, height:h, fill:offColor }));
      // Road surface — when there's an exit, only draw below the fork;
      // drawExitRamp will draw the Y-shaped surface above the fork.
      const roadTop = exitDivY !== null ? exitDivY : 0;
      add(svgEl('rect', { x:roadLeft, y:roadTop, width:roadW, height:h - roadTop, fill:roadColor }));
      // Left shoulder (full height)
      add(svgEl('rect', { x:roadLeft - lineW, y:0, width:lineW, height:h, fill:lineColor }));
      // Right shoulder — Part 1: from fork down to bottom (or full height when no exit)
      const rightTop = exitDivY !== null ? exitDivY : 0;
      add(svgEl('rect', { x:roadRight, y:rightTop, width:lineW, height:h - rightTop, fill:lineColor }));
      // Lane dividers — thick dashed
      for (let i = 1; i < laneCount; i++) {
        const lx = roadLeft + i * laneW;
        for (let y = 0; y < h; y += dashLen + gapLen) {
          add(svgEl('rect', { x:lx - lineW/2, y, width:lineW, height:dashLen, fill:dashColor }));
        }
      }
    }

    // ── LANE ROUTE FILL ──────────────────────────────────────────────────────
    // Fills ~82% of lane width with a semi-transparent teal block — no center line
    function drawLaneRouteStraight(centerX, laneW, carY, routeOpacity, routeColor) {
      routeOpacity = routeOpacity ?? 0.28;
      routeColor   = routeColor   ?? '#00C8A0';
      const fillW = laneW * 0.82;
      add(svgEl('rect', {
        x: centerX - fillW/2, y: 0,
        width: fillW, height: carY,
        fill: routeColor, opacity: routeOpacity, rx: 6,
      }));
    }

    function drawLaneRouteCurve(fromX, toX, laneW, carY, h) {
      // Single connected path for all three segments — no overlapping joints
      const seg1EndY = carY * 0.60;
      const seg2EndY = carY * 0.32;
      const fillW = laneW * 0.82;
      add(svgEl('path', {
        d: `M ${fromX} ${carY} L ${fromX} ${seg1EndY} L ${toX} ${seg2EndY} L ${toX} 0`,
        stroke: '#00C8A0',
        'stroke-width': fillW,
        'stroke-opacity': 0.28,
        fill: 'none',
        'stroke-linecap': 'butt',
        'stroke-linejoin': 'miter',
      }));
    }

    function drawLaneRouteRamp(fromX, divY, r) {
      const { h, laneW, roadRight } = r;
      const fillW     = laneW * 0.82;
      const carY      = h * 0.72;
      const exitAngle = Math.PI / 6;
      const tanA      = Math.tan(exitAngle);
      // Turning point: sin(angle)*0.5*laneW above divY → midway in the exit lane
      const turnY     = divY - Math.sin(exitAngle) * 0.5 * laneW;
      const turnX     = roadRight + turnY * tanA;
      const seg1EndY  = turnY + (carY - turnY) * 0.45;
      // Follow the exit angle from the turning point to the top
      const topX      = turnX + turnY * tanA;

      add(svgEl('path', {
        d: `M ${fromX} ${carY} L ${fromX} ${seg1EndY} L ${turnX} ${turnY} L ${topX} 0`,
        stroke: '#00FFB4',
        'stroke-width': fillW,
        'stroke-opacity': 0.88,
        fill: 'none',
        'stroke-linecap': 'butt',
        'stroke-linejoin': 'miter',
      }));
    }

    // ── CAR ───────────────────────────────────────────────────────────────────
    function drawCar(cx, cy) {
      const id = 'gf' + (Math.random() * 1e6 | 0);
      const defs = svgEl('defs', {});
      const filt = svgEl('filter', { id, x:'-70%', y:'-70%', width:'240%', height:'240%' });
      const blur = svgEl('feGaussianBlur', { stdDeviation:'6', result:'b' });
      const flood = svgEl('feFlood', { 'flood-color':'#00C8A0', 'flood-opacity':'0.55', result:'c' });
      const comp = svgEl('feComposite', { in:'c', in2:'b', operator:'in', result:'g' });
      const merge = svgEl('feMerge', {});
      merge.appendChild(svgEl('feMergeNode', { in:'g' }));
      merge.appendChild(svgEl('feMergeNode', { in:'SourceGraphic' }));
      filt.appendChild(blur); filt.appendChild(flood); filt.appendChild(comp); filt.appendChild(merge);
      defs.appendChild(filt);
      add(defs);
      add(svgEl('polygon', {
        points: `${cx},${cy-20} ${cx-14},${cy+13} ${cx+14},${cy+13}`,
        fill: '#fff', filter: `url(#${id})`,
      }));
    }

    // ── EXIT RAMP — angle-based geometry ──────────────────────────────────
    // angle: exit angle from vertical (radians)
    // divY:  where the left edge of the exit starts (= top of gore)
    // forkY: where the right edge of the exit starts = divY + laneW / sin(angle)
    // Both edges share the same angle, so the exit lane is exactly laneW wide
    // (perpendicular to the exit direction).
    function drawExitRamp(r, angle, divY, forkY) {
      const { w, roadRight, roadLeft, laneW, laneCount } = r;
      const tanA = Math.tan(angle);
      const roadColor = th('#1c2030', '#8f99aa');
      const dashColor = th('rgba(255,255,255,0.45)', 'rgba(255,255,255,0.65)');
      const lineW = 5;
      const dashLen = 24, gapLen = 18;

      // Left edge of exit:  (roadRight, divY)  → (roadRight + divY*tanA,  0)
      // Right edge of exit: (roadRight, forkY) → (roadRight + forkY*tanA, 0)
      const exLT_x = roadRight + divY * tanA;
      const exRT_x = roadRight + forkY * tanA;

      // Road surface above forkY — trapezoid from main road to exit right edge.
      add(svgEl('polygon', {
        points: `${roadLeft},0 ${roadLeft},${forkY} ${roadRight},${forkY} ${exRT_x},0`,
        fill: roadColor,
      }));

      // Grey gore triangle: straight right edge of main road vs exit left edge
      add(svgEl('polygon', {
        points: `${roadRight},${divY} ${roadRight},0 ${exLT_x},0`,
        fill: th('#5a6270', '#9099a8'),
      }));

      // Re-draw lane dashes above forkY (covered by the road polygon)
      for (let i = 1; i < laneCount; i++) {
        const lx = roadLeft + i * laneW;
        for (let y = 0; y < forkY; y += dashLen + gapLen) {
          if (y + dashLen > forkY) break;
          add(svgEl('rect', { x: lx - lineW/2, y, width: lineW, height: dashLen, fill: dashColor }));
        }
      }

      // Left edge of exit lane
      add(svgEl('line', {
        x1: roadRight, y1: divY, x2: exLT_x, y2: 0,
        stroke: th('rgba(255,255,255,0.65)', 'rgba(255,255,255,0.85)'),
        'stroke-width': 5,
      }));

      // Right edge of exit lane
      if (exRT_x < w) {
        add(svgEl('line', {
          x1: roadRight, y1: forkY, x2: exRT_x, y2: 0,
          stroke: th('rgba(255,255,255,0.55)', 'rgba(255,255,255,0.75)'),
          'stroke-width': 5,
        }));
      }
    }

    // ── URBAN ENVIRONMENT (screen 5 only) ────────────────────────────────────
    function drawUrbanEnvironment(r) {
      const { w, h, roadLeft, roadRight } = r;
      const gap    = 14;                        // clear space between building and road shoulder
      const lW     = roadLeft - gap;            // width of left strip
      const rStart = roadRight + gap;           // left edge of right strip
      const rW     = w - rStart;               // width of right strip

      const bc = [
        th('#252a35','#c2c8d4'),
        th('#1e2230','#babfc9'),
        th('#2c3040','#d0d5de'),
        th('#232730','#c8cdd8'),
      ];
      const winLit = th('rgba(255,215,100,0.65)','rgba(200,230,255,0.85)');
      const winOff = th('rgba(55,60,78,0.90)','rgba(175,180,192,0.90)');

      // Buildings: [side, yFrac, hFrac, wFrac, colorIdx]
      const bldgs = [
        ['L', 0.27, 0.18, 1.00, 2],
        ['L', 0.49, 0.20, 0.90, 1],
        ['L', 0.73, 0.17, 1.00, 3],
        ['L', 0.93, 0.07, 0.95, 0],
        ['R', 0.04, 0.19, 1.00, 1],
        ['R', 0.52, 0.19, 1.00, 0],
        ['R', 0.75, 0.17, 0.95, 2],
      ];

      // Window cell size — 2× the original
      const wW = 10, wH = 8, gX = 14, gY = 12;

      for (const [side, yf, hf, wf, ci] of bldgs) {
        const sW  = side === 'L' ? lW : rW;
        const bx  = side === 'L' ? 0 : rStart;
        const by  = h * yf, bw = sW * wf, bh = h * hf;
        add(svgEl('rect', { x: bx, y: by, width: bw, height: bh, fill: bc[ci], rx: 1 }));

        // Window grid — compute column/row count then center the whole grid
        const cols = Math.min(3, Math.max(1, Math.floor((bw - wW) / (wW + gX)) + 1));
        const rows = Math.min(4, Math.max(1, Math.floor((bh - wH) / (wH + gY)) + 1));
        const gridW = cols * wW + (cols - 1) * gX;
        const gridH = rows * wH + (rows - 1) * gY;
        const startX = bx + (bw - gridW) / 2;
        const startY = by + (bh - gridH) / 2;
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const lit = (row * 3 + col) % 3 !== 1;
            add(svgEl('rect', {
              x: startX + col * (wW + gX),
              y: startY + row * (wH + gY),
              width: wW, height: wH,
              fill: lit ? winLit : winOff, rx: 1,
            }));
          }
        }
      }

      // POI pins — 2× size (pr=14)
      const pins = [
        ['R', 0.5, 0.12, '#F5A623'],
        ['L', 0.5, 0.37, '#E84040'],
        ['R', 0.5, 0.59, '#00C8A0'],
        ['L', 0.5, 0.78, '#F5A623'],
      ];
      for (const [side, xf, yf, color] of pins) {
        const sW = side === 'L' ? lW : rW;
        const px = side === 'L' ? xf * lW : rStart + xf * sW;
        const py = h * yf;
        const pr = 14;
        add(svgEl('circle', { cx: px, cy: py, r: pr, fill: color }));
        add(svgEl('polygon', {
          points: `${px - pr * 0.55},${py + pr * 0.45} ${px + pr * 0.55},${py + pr * 0.45} ${px},${py + pr * 1.85}`,
          fill: color,
        }));
        add(svgEl('circle', { cx: px, cy: py, r: pr * 0.38, fill: '#fff', opacity: 0.9 }));
      }
    }

    // ── RENDER HIGHWAY ────────────────────────────────────────────────────────
    function renderHighway(phase) {
      const r = getRoad(phase.routePath === 'onto-ramp', phase.singleLane);
      const { h, laneW, laneCenters, roadRight, shoulder } = r;

      const carLane = phase.carLane ?? 1;
      const carX    = laneCenters[carLane];
      const carY    = h * 0.72;

      // Exit ramp geometry — derived from angle + divY
      const exitAngle = Math.PI / 6;                          // 30° from vertical
      const divY      = h * 0.18;                             // where left edge starts
      const forkY     = divY + laneW / Math.sin(exitAngle);   // where right edge starts

      // Right shoulder drawn only below forkY
      drawRoad(r, phase.showExit ? forkY : null);

      if (phase.id === 4) drawUrbanEnvironment(r);

      if (phase.showExit) drawExitRamp(r, exitAngle, divY, forkY);

      const bright = phase.id === 4;
      const rOpacity = bright ? 0.88 : 0.28;
      const rColor   = bright ? '#00FFB4' : '#00C8A0';
      if      (phase.routePath === 'straight')      drawLaneRouteStraight(carX, laneW, carY, rOpacity, rColor);
      else if (phase.routePath === 'curving-right')  drawLaneRouteCurve(carX, laneCenters[2], laneW, carY, h);
      else if (phase.routePath === 'onto-ramp')      drawLaneRouteRamp(carX, divY, r);

      drawCar(carX, carY);
    }

    // ── RENDER INTERSECTION ───────────────────────────────────────────────────
    // Cross intersection + 45° diagonal road branching off the vertical road
    // above the intersection. Uses the same edge-connection pattern as the
    // exit ramp in renderHighway (screen 3): both edges of the diagonal
    // originate from the right edge of the vertical road at different Y values.
    function renderIntersection(phase) {
      const w = W(), h = H();
      const cx = w * 0.5;
      const crossY = h * 0.42;
      const vW = 60, hW = 52, lineW = 5;

      const roadColor = th('#1c2030','#8f99aa');
      const offColor  = th('#0a0d14','#aab2c0');
      const lc = th('rgba(255,255,255,0.58)','rgba(255,255,255,0.82)');
      const dc = th('rgba(255,255,255,0.4)','rgba(255,255,255,0.62)');

      // Intersection box bounds
      const intTop    = crossY - hW/2;
      const intBottom = crossY + hW/2;
      const intLeft   = cx - vW/2;
      const intRight  = cx + vW/2;

      // ── 1. Off-road background
      add(svgEl('rect', { x:0, y:0, width:w, height:h, fill:offColor }));

      // ── 2. Diagonal road — exit-ramp style: both edges start at intRight
      const diagAngle = Math.PI / 4;               // 45° from vertical
      const tanA  = Math.tan(diagAngle);            // = 1
      const sinA  = Math.sin(diagAngle);
      const cosA  = Math.cos(diagAngle);
      const diagW = 50;                             // perpendicular width of diagonal road
      const divY  = intTop - 75;                    // upper-left edge starts here
      const forkY = divY + diagW / sinA;            // lower-right edge starts here

      // Endpoint X at y=0 for each edge
      const exLT_x = intRight + divY  * tanA;      // upper-left edge at y=0
      const exRT_x = intRight + forkY * tanA;      // lower-right edge at y=0

      // Road surface — trapezoid from fork to top of viewport
      add(svgEl('polygon', {
        points: `${intRight},${divY} ${exLT_x},0 ${exRT_x},0 ${intRight},${forkY}`,
        fill: roadColor,
      }));

      // Gore triangle between straight right edge and upper-left diagonal edge
      add(svgEl('polygon', {
        points: `${intRight},${divY} ${intRight},0 ${exLT_x},0`,
        fill: th('#5a6270','#9099a8'),
      }));

      // Upper-left edge of diagonal (from intRight down to top of viewport)
      add(svgEl('line', {
        x1: intRight, y1: divY, x2: exLT_x, y2: 0,
        stroke: lc, 'stroke-width': lineW,
      }));
      // Lower-right edge of diagonal
      if (exRT_x < w + 50) {
        add(svgEl('line', {
          x1: intRight, y1: forkY, x2: exRT_x, y2: 0,
          stroke: lc, 'stroke-width': lineW,
        }));
      }

      // ── 3. Main roads — drawn ON TOP so junction is clean
      add(svgEl('rect', { x:intLeft, y:0, width:vW, height:h, fill:roadColor }));
      add(svgEl('rect', { x:0, y:intTop, width:w, height:hW, fill:roadColor }));

      // ── 4. Road edge lines — gaps at intersection and diagonal fork
      // Vertical left edge: above and below intersection (gap = intersection box)
      add(svgEl('rect', { x:intLeft-lineW, y:0, width:lineW, height:intTop, fill:lc }));
      add(svgEl('rect', { x:intLeft-lineW, y:intBottom+lineW, width:lineW, height:h-intBottom-lineW, fill:lc }));
      // Vertical right edge below intersection (gap = intersection box)
      add(svgEl('rect', { x:intRight, y:intBottom+lineW, width:lineW, height:h-intBottom-lineW, fill:lc }));
      // Vertical right edge above intersection — only up to where diagonal forks
      add(svgEl('rect', { x:intRight, y:0, width:lineW, height:divY, fill:lc }));

      // Horizontal top edge: left and right of vertical road (gaps at road)
      add(svgEl('rect', { x:0, y:intTop-lineW, width:intLeft-lineW, height:lineW, fill:lc }));
      add(svgEl('rect', { x:intRight+lineW, y:intTop-lineW, width:w-intRight-lineW, height:lineW, fill:lc }));
      // Horizontal bottom edge: left and right of vertical road (gaps at road)
      add(svgEl('rect', { x:0, y:intBottom, width:intLeft-lineW, height:lineW, fill:lc }));
      add(svgEl('rect', { x:intRight+lineW, y:intBottom, width:w-intRight-lineW, height:lineW, fill:lc }));

      // ── 5. No center dashes on intersection roads (single-lane roads)

      // ── 6. Traffic light (no stop line — keep map clean)
      const tlX = intLeft - 28, tlY = intTop - 46;
      add(svgEl('rect', { x:tlX, y:tlY, width:18, height:44, rx:4, fill:th('#252830','#c0c5d0') }));
      add(svgEl('circle', { cx:tlX+9, cy:tlY+10, r:5.5, fill:'#cc3333' }));
      add(svgEl('circle', { cx:tlX+9, cy:tlY+22, r:5.5, fill:th('#444','#999') }));
      add(svgEl('circle', { cx:tlX+9, cy:tlY+34, r:5.5, fill:th('#444','#999') }));

      // ── 7. Route fill — single divert at the fork point, then follow diagonal
      const carY = h - 70;
      const fillW = vW * 0.82;
      // Turn point: at the top edge of the horizontal road (where the turn visually happens)
      const turnY   = intTop-7;
      const turnX   = cx;
      // Follow the 45° angle from the turning point towards top-right
      const topX    = turnX + turnY * tanA;
      const topY    = 0;

      add(svgEl('path', {
        d: `M ${cx} ${carY} L ${turnX} ${turnY} L ${topX} ${topY}`,
        stroke: '#00FFB4',
        'stroke-width': fillW,
        'stroke-opacity': 0.88,
        fill: 'none',
        'stroke-linecap': 'butt',
        'stroke-linejoin': 'miter',
      }));

      // ── 8. Small turn arrow indicating the 45° exit
      const arrowX = turnX + 50 * cosA, arrowY = turnY - 50 * sinA;
      add(svgEl('path', {
        d: `M ${arrowX - 10} ${arrowY + 10} L ${arrowX + 10} ${arrowY - 10} M ${arrowX + 2} ${arrowY - 10} L ${arrowX + 10} ${arrowY - 10} L ${arrowX + 10} ${arrowY - 2}`,
        stroke: '#F5A623', 'stroke-width': 2.5, fill: 'none', 'stroke-linecap': 'round', 'stroke-linejoin': 'round',
      }));

      // ── 9. Circled road labels
      // Road ①: right turn (horizontal road to the right of intersection)
      const r1x = intRight + 46, r1y = crossY;
      // Road ②: diagonal exit (center of diagonal road partway up)
      const diagMidY = divY * 0.52;
      const r2x = intRight + diagMidY * tanA + diagW * cosA * 0.5 + 4, r2y = diagMidY;
      function addRoadLabel(x, y, num) {
        const R = 13;
        add(svgEl('circle', { cx: x, cy: y, r: R, fill: '#ffffff', opacity: 0.92 }));
        add(svgEl('circle', { cx: x, cy: y, r: R, fill: 'none', stroke: '#222', 'stroke-width': 1.5 }));
        const t = document.createElementNS(NS, 'text');
        t.setAttribute('x', x); t.setAttribute('y', y + 5);
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('fill', '#111');
        t.setAttribute('font-size', '14');
        t.setAttribute('font-weight', '700');
        t.setAttribute('font-family', 'Inter, sans-serif');
        t.textContent = String(num);
        add(t);
      }
      addRoadLabel(r1x, r1y, 1);
      addRoadLabel(r2x, r2y, 2);

      drawCar(cx, carY);
    }

    // ── TURN ICON ────────────────────────────────────────────────────────────
    function drawTurnIcon(type) {
      const ns = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', '0 0 56 56');
      svg.setAttribute('width',   '60');
      svg.setAttribute('height',  '60');
      const paths = {
        'straight':    'M 28 48 L 28 12 M 17 22 L 28 12 L 39 22',
        'lane-right':  'M 15 48 L 15 28 Q 15 14 27 14 L 42 14 M 33 6 L 42 14 L 33 22',
        'exit-right':  'M 15 48 L 15 20 M 15 27 Q 15 13 27 13 L 44 13 M 36 5 L 44 13 L 36 21',
        'turn-right':  'M 17 48 L 17 22 Q 17 10 29 10 L 40 10 M 31 2 L 40 10 L 31 18',
      };
      const path = document.createElementNS(ns, 'path');
      path.setAttribute('d', paths[type] || paths.straight);
      path.setAttribute('stroke', '#00C8A0');
      path.setAttribute('stroke-width', '3.5');
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(path);
      const c = document.getElementById('turn-icon');
      c.innerHTML = '';
      c.appendChild(svg);
    }

    // ── PROGRESS BAR ─────────────────────────────────────────────────────────
    // pct = fraction traveled (0=start, 1=at exit)
    // Teal block fills from top down = remaining distance (1-pct).
    // Uses clientHeight px so percentage-on-flex-child ambiguity doesn't apply.
    function updateProgressBar(pct) {
      requestAnimationFrame(() => {
        const track = document.getElementById('progress-track');
        const trackH = track.clientHeight;
        const aheadPx = Math.round((1 - pct) * trackH);
        document.getElementById('progress-ahead').style.height = aheadPx + 'px';
      });
    }

    // ── RENDER ────────────────────────────────────────────────────────────────
    let currentPhase = 0;

    function renderPhase(n) {
      currentPhase = n;
      const phase = PHASES[n];
      clearScene();

      scene.classList.remove('phase-enter');
      void scene.offsetWidth;
      scene.classList.add('phase-enter');
      scene.addEventListener('animationend', () => scene.classList.remove('phase-enter'), { once: true });

      document.getElementById('instruction-text').textContent = phase.instruction;
      document.getElementById('distance-readout').textContent = phase.distance;
      document.getElementById('eta-dur').textContent  = phase.etaMin;
      document.getElementById('eta-min').textContent  = phase.etaMin;
      drawTurnIcon(phase.turnIconType);

      const banner = document.getElementById('lane-banner');
      if (phase.bannerVisible) { banner.textContent = phase.bannerText; banner.style.display = 'block'; }
      else                     { banner.style.display = 'none'; }

      document.getElementById('exit-sign').style.display = phase.showExitLabel ? 'block' : 'none';
      const progressPanel = document.getElementById('progress-bar-panel');
      if (phase.hideProgress) { progressPanel.style.display = 'none'; }
      else { progressPanel.style.display = ''; updateProgressBar(phase.progressPct ?? 0.05); }

      if      (phase.scene === 'highway')      renderHighway(phase);
      else if (phase.scene === 'intersection') renderIntersection(phase);

      document.querySelectorAll('#phase-labels span').forEach((el, i) => {
        el.classList.toggle('active', i === n);
      });
    }

    // ── SLIDER ────────────────────────────────────────────────────────────────
    const slider = document.getElementById('phase-slider');
    function updateSliderFill(val) {
      const pct = (val / 4) * 100;
      slider.style.background = `linear-gradient(to right, #00C8A0 ${pct}%, var(--border-strong) ${pct}%)`;
    }
    slider.addEventListener('input', e => {
      const v = parseInt(e.target.value);
      renderPhase(v); updateSliderFill(v);
    });
    document.querySelectorAll('#phase-labels span').forEach(el => {
      el.addEventListener('click', () => {
        const p = parseInt(el.dataset.phase);
        slider.value = p; renderPhase(p); updateSliderFill(p);
      });
    });
    window.addEventListener('resize', () => renderPhase(currentPhase));

    // ── INIT ──────────────────────────────────────────────────────────────────
    renderPhase(0);
    updateSliderFill(0);
  </script>
</body>
</html>
