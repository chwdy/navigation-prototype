<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation Prototype — CS6750</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══ THEME TOKENS ══ */
    :root {
      --accent: #00C8A0;
      --amber: #F5A623;
      --danger: #E84040;
    }

    [data-theme="dark"] {
      --bg-body:        #0a0c10;
      --bg-panel:       #1A1D24;
      --bg-map:         #0D1018;
      --bg-road:        #1a1e28;
      --bg-progress:    #141720;
      --bg-menu:        #22262f;
      --border:         rgba(255,255,255,0.08);
      --border-strong:  rgba(255,255,255,0.15);
      --text-primary:   #ffffff;
      --text-secondary: rgba(255,255,255,0.5);
      --text-muted:     rgba(255,255,255,0.28);
      --lane-line:      rgba(255,255,255,0.65);
      --road-shoulder:  rgba(255,255,255,0.7);
      --offroad:        #0D1018;
      --switcher-bg:    rgba(255,255,255,0.04);
      --switcher-border:rgba(255,255,255,0.08);
    }

    [data-theme="light"] {
      --bg-body:        #e8eaee;
      --bg-panel:       #ffffff;
      --bg-map:         #c8cdd8;
      --bg-road:        #9ba3b4;
      --bg-progress:    #dde0e8;
      --bg-menu:        #ffffff;
      --border:         rgba(0,0,0,0.08);
      --border-strong:  rgba(0,0,0,0.15);
      --text-primary:   #1a1d24;
      --text-secondary: rgba(0,0,0,0.5);
      --text-muted:     rgba(0,0,0,0.35);
      --lane-line:      rgba(255,255,255,0.85);
      --road-shoulder:  rgba(255,255,255,0.9);
      --offroad:        #b0b8c8;
      --switcher-bg:    rgba(0,0,0,0.04);
      --switcher-border:rgba(0,0,0,0.1);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      background: var(--bg-body);
      font-family: 'Inter', sans-serif;
      padding: 24px 16px 16px;
      gap: 20px;
      transition: background 0.3s;
    }

    /* ══════════════════════════════════════════
       PHONE FRAME
    ══════════════════════════════════════════ */
    #phone {
      width: 375px;
      height: 680px;
      background: var(--bg-panel);
      border-radius: 36px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 0 1px var(--border), 0 24px 80px rgba(0,0,0,0.5);
      position: relative;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    /* ── NAV PANEL (30% = 204px) ── */
    #nav-panel {
      height: 30%;
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
      position: relative;
      transition: background 0.3s, border-color 0.3s;
    }

    #nav-top-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #turn-icon { width: 56px; height: 56px; flex-shrink: 0; }

    #nav-text { flex: 1; min-width: 0; }

    #instruction-text {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-primary);
      transition: color 0.3s;
    }

    #distance-readout {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      color: var(--accent);
      margin-top: 4px;
    }

    #nav-bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 6px;
      border-top: 1px solid var(--border);
      margin-top: 2px;
    }

    #eta-info {
      font-size: 12px;
      color: var(--text-secondary);
      transition: color 0.3s;
    }
    #eta-info strong { color: var(--text-primary); font-weight: 600; }

    #route-summary {
      font-size: 12px;
      color: var(--text-muted);
      transition: color 0.3s;
    }

    /* Lane change banner */
    #lane-banner {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(245,166,35,0.16);
      border-top: 1px solid rgba(245,166,35,0.5);
      color: var(--amber);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 16px;
      display: none;
      animation: slideUp 0.3s ease-out;
    }

    /* ── MAP SECTION ── */
    #map-section {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
      background: var(--bg-map);
      transition: background 0.3s;
    }

    #road-canvas {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #scene-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    #exit-sign {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: #1A6B3A;
      border: 2px solid #fff;
      color: #fff;
      border-radius: 6px;
      padding: 4px 14px;
      font-family: 'DM Mono', monospace;
      text-align: center;
      display: none;
      z-index: 10;
    }
    #exit-sign .exit-label { font-size: 10px; display: block; opacity: 0.8; }
    #exit-sign .exit-number { font-size: 18px; font-weight: 500; display: block; }

    /* ── VERTICAL PROGRESS BAR ── */
    #progress-bar-panel {
      width: 52px;
      background: var(--bg-progress);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 0 14px;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }

    #progress-exit-label {
      font-size: 9px;
      font-family: 'DM Mono', monospace;
      background: #1A6B3A22;
      border: 1px solid #1A6B3A88;
      border-radius: 3px;
      padding: 2px 5px;
      text-align: center;
      z-index: 2;
      flex-shrink: 0;
      color: #4ade80;
    }

    #progress-track-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 8px 0;
    }

    #progress-track {
      width: 4px;
      flex: 1;
      background: var(--border-strong);
      border-radius: 2px;
      position: relative;
      overflow: visible;
      transition: background 0.3s;
    }

    #progress-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(to top, var(--accent), rgba(0,200,160,0.25));
      border-radius: 2px;
      transition: height 0.5s ease-out;
    }

    #progress-car-dot {
      position: absolute;
      left: 50%;
      transform: translate(-50%, 50%);
      width: 12px;
      height: 12px;
      background: #fff;
      border: 2.5px solid var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(0,200,160,0.6);
      transition: bottom 0.5s ease-out;
    }

    #progress-you-label {
      font-size: 8px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 6px;
      font-family: 'DM Mono', monospace;
      flex-shrink: 0;
      transition: color 0.3s;
    }

    /* ── BOTTOM ACTION BAR ── */
    #bottom-bar {
      height: 52px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
      position: relative;
    }

    #cancel-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(232,64,64,0.12);
      border: 1px solid rgba(232,64,64,0.3);
      color: var(--danger);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      transition: background 0.2s;
      user-select: none;
    }
    #cancel-btn:hover { background: rgba(232,64,64,0.22); }

    #eta-center {
      text-align: center;
    }
    #eta-center .eta-arrive {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      transition: color 0.3s;
    }
    #eta-center .eta-meta {
      font-size: 10px;
      color: var(--text-muted);
      transition: color 0.3s;
    }

    #menu-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--border);
      border: 1px solid var(--border-strong);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      transition: background 0.2s;
      user-select: none;
      position: relative;
    }
    #menu-btn:hover { background: var(--border-strong); }

    /* ── POPUP MENU ── */
    #popup-menu {
      position: absolute;
      bottom: 46px;
      right: 14px;
      background: var(--bg-menu);
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 6px 0;
      min-width: 160px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      display: none;
      z-index: 100;
      transition: background 0.3s;
    }
    #popup-menu.open { display: block; animation: popIn 0.15s ease-out; }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.15s, color 0.3s;
      user-select: none;
    }
    .menu-item:hover { background: var(--border); }
    .menu-item .menu-icon { font-size: 15px; width: 20px; text-align: center; }

    .menu-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* ══════════════════════════════════════════
       EXTERNAL PHASE SWITCHER
    ══════════════════════════════════════════ */
    #phase-switcher {
      width: 375px;
      background: var(--switcher-bg);
      border: 1px solid var(--switcher-border);
      border-radius: 12px;
      padding: 12px 16px 14px;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }

    #switcher-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      font-family: 'DM Mono', monospace;
      transition: color 0.3s;
    }

    #phase-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: var(--border-strong);
      outline: none;
      cursor: pointer;
      margin-bottom: 8px;
    }
    #phase-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg-body);
      cursor: pointer;
    }
    #phase-slider::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg-body);
      cursor: pointer;
    }

    #phase-labels { display: flex; justify-content: space-between; }
    #phase-labels span {
      font-size: 10px;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.2s;
      user-select: none;
    }
    #phase-labels span.active { color: var(--accent); font-weight: 600; }
    #phase-labels span:hover { color: var(--text-secondary); }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .phase-enter { animation: fadeIn 0.25s ease-out; }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92) translateY(4px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ══ PHONE UI ══ -->
  <div id="phone">

    <!-- NAV PANEL (30%) -->
    <div id="nav-panel">
      <div id="nav-top-row">
        <div id="turn-icon"></div>
        <div id="nav-text">
          <div id="instruction-text">Stay in lane</div>
          <div id="distance-readout">1 mi</div>
        </div>
      </div>
      <div id="nav-bottom-row">
        <div id="eta-info">Via I-85 N</div>
        <div id="route-summary"><span id="eta-dur">3:11</span> · 8.2 mi remaining</div>
      </div>
      <div id="lane-banner"></div>
    </div>

    <!-- MAP SECTION -->
    <div id="map-section">
      <div id="road-canvas">
        <svg id="scene-svg" width="100%" height="100%"></svg>
        <div id="exit-sign">
          <span class="exit-label">Exit</span>
          <span class="exit-number">1A</span>
        </div>
      </div>
      <div id="progress-bar-panel">
        <div id="progress-exit-label">1A</div>
        <div id="progress-track-wrap">
          <div id="progress-track">
            <div id="progress-fill"></div>
            <div id="progress-car-dot"></div>
          </div>
        </div>
        <div id="progress-you-label">YOU</div>
      </div>
    </div>

    <!-- BOTTOM ACTION BAR -->
    <div id="bottom-bar">
      <div id="cancel-btn" title="Cancel navigation">✕</div>
      <div id="eta-center">
        <div class="eta-arrive">Arrive <strong id="eta-time">3:14 PM</strong></div>
        <div class="eta-meta"><span id="eta-min">3 min</span> · 8.2 mi</div>
      </div>
      <div id="menu-btn" title="More options">···</div>

      <!-- Popup menu -->
      <div id="popup-menu">
        <div class="menu-item" id="theme-toggle">
          <span class="menu-icon" id="theme-icon">☀️</span>
          <span id="theme-label">Light mode</span>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item">
          <span class="menu-icon">🔇</span>
          <span>Mute voice</span>
        </div>
        <div class="menu-item">
          <span class="menu-icon">↩</span>
          <span>Alternative routes</span>
        </div>
      </div>
    </div>

  </div>

  <!-- ══ EXTERNAL PHASE SWITCHER ══ -->
  <div id="phase-switcher">
    <div id="switcher-label">Phase switcher — prototype control only</div>
    <input type="range" id="phase-slider" min="0" max="4" step="1" value="0">
    <div id="phase-labels">
      <span data-phase="0">1 mi ahead</span>
      <span data-phase="1">500 ft</span>
      <span data-phase="2">At exit</span>
      <span data-phase="3">Complex turn</span>
      <span data-phase="4">After turn</span>
    </div>
  </div>

  <script>
    // ── PHASE DATA ──────────────────────────────────────────────────────────
    const PHASES = [
      {
        id: 0,
        instruction: 'Stay in lane',
        distance: '1 mi',
        turnIconType: 'straight',
        bannerVisible: false,
        etaMin: '3 min',
        scene: 'top-down-highway',
        carLane: 1,
        showExit: false,
        routePath: 'straight',
        progressPct: 0.05,
      },
      {
        id: 1,
        instruction: 'Move to right lane',
        distance: '500 ft',
        turnIconType: 'lane-right',
        bannerVisible: true,
        bannerText: '● Move to right lane — exit in 500 ft',
        etaMin: '3 min',
        scene: 'top-down-highway',
        carLane: 1,
        showExit: true,
        routePath: 'curving-right',
        progressPct: 0.40,
      },
      {
        id: 2,
        instruction: 'Exit 1A — take ramp',
        distance: 'Exit 1A',
        turnIconType: 'exit-right',
        bannerVisible: false,
        etaMin: '2 min',
        scene: 'top-down-highway',
        carLane: 2,
        showExit: true,
        showExitLabel: true,
        routePath: 'onto-ramp',
        progressPct: 0.82,
      },
      {
        id: 3,
        instruction: 'Turn right at light',
        distance: '200 ft',
        turnIconType: 'turn-right',
        bannerVisible: false,
        etaMin: '1 min',
        scene: 'schematic-intersection',
        turnDirection: 'right',
        progressPct: 0.95,
      },
      {
        id: 4,
        instruction: 'Continue straight',
        distance: '0.8 mi',
        turnIconType: 'straight',
        bannerVisible: false,
        etaMin: '1 min',
        scene: 'top-down-highway',
        carLane: 1,
        showExit: false,
        routePath: 'straight',
        progressPct: 0.08,
      },
    ];

    // ── THEME ────────────────────────────────────────────────────────────────
    let isDark = true;

    document.getElementById('theme-toggle').addEventListener('click', () => {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent = isDark ? 'Light mode' : 'Dark mode';
      closeMenu();
      // Redraw scene for updated road colors
      renderPhase(currentPhase);
    });

    // ── MENU ─────────────────────────────────────────────────────────────────
    const menuBtn = document.getElementById('menu-btn');
    const popupMenu = document.getElementById('popup-menu');

    menuBtn.addEventListener('click', e => {
      e.stopPropagation();
      popupMenu.classList.toggle('open');
    });

    function closeMenu() { popupMenu.classList.remove('open'); }

    document.addEventListener('click', closeMenu);
    popupMenu.addEventListener('click', e => e.stopPropagation());

    // ── SVG HELPERS ──────────────────────────────────────────────────────────
    const scene = document.getElementById('scene-svg');
    const NS = 'http://www.w3.org/2000/svg';

    function svgEl(tag, attrs) {
      const el = document.createElementNS(NS, tag);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      return el;
    }
    function add(el) { scene.appendChild(el); }
    function W() { return scene.clientWidth; }
    function H() { return scene.clientHeight; }
    function clearScene() { scene.innerHTML = ''; }

    function themeVal(darkVal, lightVal) {
      return isDark ? darkVal : lightVal;
    }

    // ── TOP-DOWN ROAD ────────────────────────────────────────────────────────
    function drawTopDownRoad() {
      const w = W(), h = H();
      const laneCount = 3;
      const laneW = 40;
      const roadW = laneCount * laneW;
      const roadLeft = (w - roadW) / 2;
      const roadRight = roadLeft + roadW;
      const lineThick = 5;

      // Off-road
      add(svgEl('rect', { x: 0, y: 0, width: w, height: h, fill: themeVal('#0D1018', '#b0b8c8') }));
      // Road surface
      add(svgEl('rect', { x: roadLeft, y: 0, width: roadW, height: h, fill: themeVal('#1a1e28', '#9ba3b4') }));

      // Shoulders
      add(svgEl('rect', { x: roadLeft - lineThick, y: 0, width: lineThick, height: h, fill: themeVal('rgba(255,255,255,0.7)', 'rgba(255,255,255,0.85)') }));
      add(svgEl('rect', { x: roadRight, y: 0, width: lineThick, height: h, fill: themeVal('rgba(255,255,255,0.7)', 'rgba(255,255,255,0.85)') }));

      // Lane dividers — thick dashed
      const dashLen = 22, gapLen = 16;
      for (let i = 1; i < laneCount; i++) {
        const lx = roadLeft + i * laneW;
        for (let y = 0; y < h; y += dashLen + gapLen) {
          add(svgEl('rect', {
            x: lx - lineThick / 2, y,
            width: lineThick, height: dashLen,
            fill: themeVal('rgba(255,255,255,0.65)', 'rgba(255,255,255,0.8)'),
          }));
        }
      }

      return { roadLeft, roadRight, roadW, laneW, lineThick };
    }

    // ── CAR ───────────────────────────────────────────────────────────────────
    function drawCar(cx, cy) {
      const defs = svgEl('defs', {});
      const filtId = 'cg_' + Math.random().toString(36).slice(2);
      const filt = svgEl('filter', { id: filtId, x: '-60%', y: '-60%', width: '220%', height: '220%' });
      const blur = svgEl('feGaussianBlur', { stdDeviation: '5', result: 'blur' });
      const flood = svgEl('feFlood', { 'flood-color': '#00C8A0', 'flood-opacity': '0.6', result: 'color' });
      const comp = svgEl('feComposite', { in: 'color', in2: 'blur', operator: 'in', result: 'glow' });
      const merge = svgEl('feMerge', {});
      merge.appendChild(svgEl('feMergeNode', { in: 'glow' }));
      merge.appendChild(svgEl('feMergeNode', { in: 'SourceGraphic' }));
      filt.appendChild(blur); filt.appendChild(flood); filt.appendChild(comp); filt.appendChild(merge);
      defs.appendChild(filt);
      add(defs);

      const pts = `${cx},${cy - 18} ${cx - 13},${cy + 12} ${cx + 13},${cy + 12}`;
      add(svgEl('polygon', { points: pts, fill: '#fff', filter: `url(#${filtId})` }));
    }

    // ── ANIMATED PATH ────────────────────────────────────────────────────────
    function animatedPath(d, color = '#00C8A0', width = 6) {
      const path = svgEl('path', {
        d,
        stroke: color,
        'stroke-width': width,
        fill: 'none',
        'stroke-linecap': 'round',
        'stroke-linejoin': 'round',
      });
      const len = 900;
      path.style.strokeDasharray = len;
      path.style.strokeDashoffset = len;
      path.style.transition = 'stroke-dashoffset 0.55s ease-out';
      add(path);
      requestAnimationFrame(() => requestAnimationFrame(() => { path.style.strokeDashoffset = '0'; }));
      return path;
    }

    // ── RENDER TOP-DOWN HIGHWAY ──────────────────────────────────────────────
    function renderTopDownHighway(phase) {
      const w = W(), h = H();
      const road = drawTopDownRoad();
      const { roadLeft, roadRight, laneW, lineThick } = road;

      const laneCenters = [
        roadLeft + laneW * 0.5,
        roadLeft + laneW * 1.5,
        roadLeft + laneW * 2.5,
      ];

      const carY = h * 0.72;
      const carLane = phase.carLane ?? 1;
      const carX = laneCenters[carLane];

      // Exit ramp (phases 1, 2)
      if (phase.showExit) {
        const rampStartY = h * 0.18;
        const rampStartX = roadRight + lineThick;
        const rampEndX = w - 4;
        const rampEndY = h * 0.04;

        // Ramp surface
        add(svgEl('path', {
          d: `M ${rampStartX} ${rampStartY} Q ${rampEndX} ${rampStartY} ${rampEndX} ${rampEndY}`,
          stroke: themeVal('#1a1e28', '#9ba3b4'),
          'stroke-width': 34,
          fill: 'none',
        }));
        // Ramp edge lines
        add(svgEl('path', {
          d: `M ${rampStartX} ${rampStartY} Q ${rampEndX} ${rampStartY} ${rampEndX} ${rampEndY}`,
          stroke: themeVal('rgba(255,255,255,0.5)', 'rgba(255,255,255,0.75)'),
          'stroke-width': lineThick,
          fill: 'none',
          'stroke-dasharray': '10 8',
          'stroke-linecap': 'round',
        }));
      }

      // Route path
      if (phase.routePath === 'straight') {
        animatedPath(`M ${carX} ${carY} L ${carX} 0`);
      } else if (phase.routePath === 'curving-right') {
        const rightX = laneCenters[2];
        const midY = carY * 0.55;
        animatedPath(`M ${carX} ${carY} Q ${carX} ${midY + 40} ${rightX} ${midY} L ${rightX} 0`);
      } else if (phase.routePath === 'onto-ramp') {
        const rampStartY = h * 0.18;
        const rampStartX = roadRight + lineThick;
        animatedPath(`M ${carX} ${carY} L ${carX} ${rampStartY} Q ${rampStartX + 20} ${rampStartY - 10} ${W() - 4} ${h * 0.04}`);
      }

      // Car (drawn on top)
      drawCar(carX, carY);
    }

    // ── SCHEMATIC INTERSECTION ───────────────────────────────────────────────
    function renderSchematic(phase) {
      const w = W(), h = H();
      const cx = w * 0.5;
      const crossY = h * 0.42;
      const vW = 60, hW = 54;
      const lineThick = 5;

      add(svgEl('rect', { x: 0, y: 0, width: w, height: h, fill: themeVal('#0D1018', '#b0b8c8') }));

      // Roads
      add(svgEl('rect', { x: cx - vW / 2, y: 0, width: vW, height: h, fill: themeVal('#1a1e28', '#9ba3b4') }));
      add(svgEl('rect', { x: 0, y: crossY - hW / 2, width: w, height: hW, fill: themeVal('#1a1e28', '#9ba3b4') }));

      const laneColor = themeVal('rgba(255,255,255,0.65)', 'rgba(255,255,255,0.85)');

      // Road edge lines — vertical
      for (const side of [-1, 1]) {
        const ex = cx + side * (vW / 2);
        add(svgEl('line', { x1: ex, y1: 0, x2: ex, y2: h, stroke: laneColor, 'stroke-width': lineThick }));
      }
      // Road edge lines — horizontal
      for (const side of [-1, 1]) {
        const ey = crossY + side * (hW / 2);
        add(svgEl('line', { x1: 0, y1: ey, x2: w, y2: ey, stroke: laneColor, 'stroke-width': lineThick }));
      }

      // Center dashes — vertical
      const dashColor = themeVal('rgba(255,255,255,0.4)', 'rgba(255,255,255,0.6)');
      for (let y = crossY + hW / 2 + 10; y < h; y += 38) {
        add(svgEl('rect', { x: cx - lineThick / 2, y, width: lineThick, height: 20, fill: dashColor }));
      }
      // Center dashes — horizontal
      for (let x = 0; x < cx - vW / 2; x += 38) {
        add(svgEl('rect', { x, y: crossY - lineThick / 2, width: 20, height: lineThick, fill: dashColor }));
      }
      for (let x = cx + vW / 2 + 10; x < w; x += 38) {
        add(svgEl('rect', { x, y: crossY - lineThick / 2, width: 20, height: lineThick, fill: dashColor }));
      }

      // Stop line
      add(svgEl('rect', { x: cx - vW / 2, y: crossY + hW / 2 + 4, width: vW, height: 4, fill: 'rgba(255,255,255,0.8)' }));

      // Traffic light
      const tlX = cx + vW / 2 + 10;
      const tlY = crossY - hW / 2 - 46;
      add(svgEl('rect', { x: tlX, y: tlY, width: 18, height: 44, rx: 4, fill: themeVal('#252830', '#c0c5d0') }));
      add(svgEl('circle', { cx: tlX + 9, cy: tlY + 10, r: 5.5, fill: '#cc3333' }));
      add(svgEl('circle', { cx: tlX + 9, cy: tlY + 22, r: 5.5, fill: themeVal('#444', '#999') }));
      add(svgEl('circle', { cx: tlX + 9, cy: tlY + 34, r: 5.5, fill: themeVal('#444', '#999') }));

      // Route
      const carY = h - 65;
      const dir = phase.turnDirection;
      const turnEndX = dir === 'right' ? w - 10 : 10;
      animatedPath(
        `M ${cx} ${carY - 18} L ${cx} ${crossY} Q ${cx} ${crossY + 2} ${cx + (dir === 'right' ? vW * 0.6 : -vW * 0.6)} ${crossY} L ${turnEndX} ${crossY}`,
        '#00C8A0', 5
      );

      // Small turn arrow
      const ax = cx + (dir === 'right' ? vW * 0.8 : -vW * 0.8);
      const arrowD = dir === 'right'
        ? `M ${ax - 10} ${crossY + 10} L ${ax - 10} ${crossY - 4} Q ${ax - 10} ${crossY - 13} ${ax - 2} ${crossY - 13} L ${ax + 10} ${crossY - 13} M ${ax + 4} ${crossY - 18} L ${ax + 10} ${crossY - 13} L ${ax + 4} ${crossY - 8}`
        : `M ${ax + 10} ${crossY + 10} L ${ax + 10} ${crossY - 4} Q ${ax + 10} ${crossY - 13} ${ax + 2} ${crossY - 13} L ${ax - 10} ${crossY - 13} M ${ax - 4} ${crossY - 18} L ${ax - 10} ${crossY - 13} L ${ax - 4} ${crossY - 8}`;
      add(svgEl('path', { d: arrowD, stroke: '#F5A623', 'stroke-width': 2.5, fill: 'none', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));

      drawCar(cx, carY);
    }

    // ── TURN ICON ────────────────────────────────────────────────────────────
    function drawTurnIcon(type) {
      const ns = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', '0 0 56 56');
      svg.setAttribute('width', '56');
      svg.setAttribute('height', '56');
      svg.setAttribute('fill', 'none');

      const defs = {
        straight:   'M 28 46 L 28 14 M 18 24 L 28 14 L 38 24',
        'lane-right': 'M 16 46 L 16 28 Q 16 16 26 16 L 40 16 M 32 8 L 40 16 L 32 24',
        'exit-right': 'M 16 46 L 16 20 M 16 26 Q 16 14 28 14 L 44 14 M 36 6 L 44 14 L 36 22',
        'turn-right': 'M 18 46 L 18 22 Q 18 10 30 10 L 40 10 M 32 2 L 40 10 L 32 18',
      };

      const path = document.createElementNS(ns, 'path');
      path.setAttribute('d', defs[type] || defs.straight);
      path.setAttribute('stroke', '#00C8A0');
      path.setAttribute('stroke-width', '3');
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(path);

      const container = document.getElementById('turn-icon');
      container.innerHTML = '';
      container.appendChild(svg);
    }

    // ── PROGRESS BAR ─────────────────────────────────────────────────────────
    function updateProgressBar(pct) {
      document.getElementById('progress-fill').style.height = (pct * 100).toFixed(1) + '%';
      document.getElementById('progress-car-dot').style.bottom = (pct * 100).toFixed(1) + '%';
    }

    // ── RENDER ────────────────────────────────────────────────────────────────
    let currentPhase = 0;

    function renderPhase(n) {
      currentPhase = n;
      const phase = PHASES[n];
      clearScene();

      scene.classList.remove('phase-enter');
      void scene.offsetWidth;
      scene.classList.add('phase-enter');
      scene.addEventListener('animationend', () => scene.classList.remove('phase-enter'), { once: true });

      // Header
      document.getElementById('instruction-text').textContent = phase.instruction;
      document.getElementById('distance-readout').textContent = phase.distance;
      document.getElementById('eta-dur').textContent = phase.etaMin;
      document.getElementById('eta-min').textContent = phase.etaMin;
      drawTurnIcon(phase.turnIconType);

      // Banner
      const banner = document.getElementById('lane-banner');
      if (phase.bannerVisible) {
        banner.textContent = phase.bannerText;
        banner.style.display = 'block';
      } else {
        banner.style.display = 'none';
      }

      // Exit sign
      document.getElementById('exit-sign').style.display = phase.showExitLabel ? 'block' : 'none';

      // Progress bar
      updateProgressBar(phase.progressPct ?? 0.05);

      // Scene
      if (phase.scene === 'top-down-highway') renderTopDownHighway(phase);
      else if (phase.scene === 'schematic-intersection') renderSchematic(phase);

      // Phase labels
      document.querySelectorAll('#phase-labels span').forEach((el, i) => {
        el.classList.toggle('active', i === n);
      });
    }

    // ── SLIDER ────────────────────────────────────────────────────────────────
    const slider = document.getElementById('phase-slider');

    function updateSliderFill(val) {
      const pct = (val / 4) * 100;
      slider.style.background = `linear-gradient(to right, #00C8A0 ${pct}%, var(--border-strong) ${pct}%)`;
    }

    slider.addEventListener('input', e => {
      const val = parseInt(e.target.value);
      renderPhase(val);
      updateSliderFill(val);
    });

    document.querySelectorAll('#phase-labels span').forEach(el => {
      el.addEventListener('click', () => {
        const p = parseInt(el.dataset.phase);
        slider.value = p;
        renderPhase(p);
        updateSliderFill(p);
      });
    });

    window.addEventListener('resize', () => renderPhase(currentPhase));

    // ── INIT ──────────────────────────────────────────────────────────────────
    renderPhase(0);
    updateSliderFill(0);
  </script>
</body>
</html>
