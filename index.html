<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation Prototype — CS6750</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: #111318;
      color: #fff;
      font-family: 'Inter', sans-serif;
    }

    /* ── HEADER BAR ── */
    #header-bar {
      height: 72px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      background: #1A1D24;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    #turn-icon {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
    }

    #instruction-text {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #distance-readout {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      color: #00C8A0;
      flex-shrink: 0;
    }

    /* ── MAP CANVAS ── */
    #map-canvas {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #scene-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── LANE CHANGE BANNER ── */
    #lane-banner {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(245,166,35,0.15);
      border-bottom: 1px solid rgba(245,166,35,0.4);
      color: #F5A623;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      display: none;
      animation: slideDown 0.3s ease-out;
      z-index: 10;
    }

    /* ── EXIT SIGN ── */
    #exit-sign {
      position: absolute;
      top: 14px;
      right: 16px;
      background: #1A6B3A;
      border: 2px solid #fff;
      color: #fff;
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      display: none;
      z-index: 10;
      text-align: center;
    }
    #exit-sign .exit-label { font-size: 11px; display: block; opacity: 0.8; }
    #exit-sign .exit-number { font-size: 20px; font-weight: 500; display: block; }

    /* ── BOTTOM PANEL ── */
    #bottom-panel {
      height: 110px;
      flex-shrink: 0;
      background: #1A1D24;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 12px 20px;
    }

    #eta-bar {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
    }
    #eta-time { color: #fff; font-weight: 600; }

    #slider-track {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── RANGE SLIDER ── */
    #phase-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
      cursor: pointer;
    }
    #phase-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #00C8A0;
      border: 2px solid #111318;
      cursor: pointer;
    }
    #phase-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #00C8A0;
      border: 2px solid #111318;
      cursor: pointer;
    }

    /* ── PHASE LABELS ── */
    #phase-labels {
      display: flex;
      justify-content: space-between;
    }
    #phase-labels span {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      transition: color 0.2s;
      user-select: none;
    }
    #phase-labels span.active {
      color: #00C8A0;
      font-weight: 600;
    }
    #phase-labels span:hover {
      color: rgba(255,255,255,0.7);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .phase-enter {
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- HEADER BAR -->
  <div id="header-bar">
    <div id="turn-icon"></div>
    <div id="instruction-text"></div>
    <div id="distance-readout"></div>
  </div>

  <!-- MAP CANVAS -->
  <div id="map-canvas">
    <svg id="scene-svg" width="100%" height="100%"></svg>
    <div id="lane-banner">● Move to right lane in 0.5 mi</div>
    <div id="exit-sign">
      <span class="exit-label">Exit</span>
      <span class="exit-number">1A</span>
    </div>
  </div>

  <!-- BOTTOM PANEL -->
  <div id="bottom-panel">
    <div id="eta-bar">
      <span id="eta-time">3:11</span>
      <span id="eta-dist"> · 8.2 mi · Arrive 3:14 PM</span>
    </div>
    <div id="slider-track">
      <input type="range" id="phase-slider" min="0" max="4" step="1" value="0">
      <div id="phase-labels">
        <span data-phase="0">1 mi ahead</span>
        <span data-phase="1">500 ft</span>
        <span data-phase="2">At exit</span>
        <span data-phase="3">Complex turn</span>
        <span data-phase="4">After turn</span>
      </div>
    </div>
  </div>

  <script>
    // ── PHASE DATA ──────────────────────────────────────────────────────────────
    const PHASES = [
      {
        id: 0,
        label: '1 mi ahead',
        instruction: 'Stay in lane',
        distance: '1 mi',
        turnIconType: 'straight',
        bannerVisible: false,
        etaTime: '3:11',
        scene: 'perspective-highway',
        carLane: 1,
        showExit: false,
        routePath: 'straight',
      },
      {
        id: 1,
        label: '500 ft',
        instruction: 'Move to right lane',
        distance: '500 ft',
        turnIconType: 'lane-right',
        bannerVisible: true,
        bannerText: '● Move to right lane in 0.5 mi',
        etaTime: '3:11',
        scene: 'perspective-highway',
        carLane: 1,
        showExit: true,
        routePath: 'curving-right',
      },
      {
        id: 2,
        label: 'At exit',
        instruction: 'Exit 1A — take ramp',
        distance: 'Exit 1A',
        turnIconType: 'exit-right',
        bannerVisible: false,
        etaTime: '2:54',
        scene: 'perspective-highway',
        carLane: 2,
        showExit: true,
        showExitLabel: true,
        routePath: 'onto-ramp',
      },
      {
        id: 3,
        label: 'Complex turn',
        instruction: 'Turn right at light',
        distance: '200 ft',
        turnIconType: 'turn-right',
        bannerVisible: false,
        etaTime: '2:41',
        scene: 'schematic-intersection',
        turnDirection: 'right',
        routePath: 'turn',
      },
      {
        id: 4,
        label: 'After turn',
        instruction: 'Continue straight',
        distance: '0.8 mi',
        turnIconType: 'straight',
        bannerVisible: false,
        etaTime: '2:38',
        scene: 'perspective-highway',
        carLane: 1,
        showExit: false,
        routePath: 'straight',
      },
    ];

    // ── SVG HELPERS ─────────────────────────────────────────────────────────────
    const scene = document.getElementById('scene-svg');
    const NS = 'http://www.w3.org/2000/svg';

    function svgEl(tag, attrs) {
      const el = document.createElementNS(NS, tag);
      for (const [k, v] of Object.entries(attrs)) {
        el.setAttribute(k, v);
      }
      return el;
    }

    function add(el) { scene.appendChild(el); }
    function W() { return scene.clientWidth; }
    function H() { return scene.clientHeight; }
    function clearScene() { scene.innerHTML = ''; }

    // ── PERSPECTIVE ROAD ────────────────────────────────────────────────────────
    function drawPerspectiveRoad(laneCount, opts = {}) {
      const w = W(), h = H();
      const vanishX = w * 0.5;
      const vanishY = h * 0.32;
      const roadBottomLeft = w * 0.05;
      const roadBottomRight = w * 0.95;
      const roadBottomWidth = roadBottomRight - roadBottomLeft;

      // Sky gradient
      const sky = svgEl('defs', {});
      const skyGrad = svgEl('linearGradient', { id: 'skyGrad', x1: '0', y1: '0', x2: '0', y2: '1' });
      skyGrad.appendChild(svgEl('stop', { offset: '0%', 'stop-color': '#0A0D14' }));
      skyGrad.appendChild(svgEl('stop', { offset: '100%', 'stop-color': '#1A1D24' }));
      sky.appendChild(skyGrad);
      add(sky);

      // Sky
      add(svgEl('rect', { x: 0, y: 0, width: w, height: vanishY, fill: 'url(#skyGrad)' }));

      // Road surface — trapezoid
      const roadPath = `M ${roadBottomLeft} ${h} L ${vanishX - 2} ${vanishY} L ${vanishX + 2} ${vanishY} L ${roadBottomRight} ${h} Z`;
      add(svgEl('path', { d: roadPath, fill: '#111318' }));

      // Draw perspective dashed lines
      const divCount = laneCount + 1;
      for (let i = 0; i < divCount; i++) {
        const f = i / (divCount - 1);
        const bx = roadBottomLeft + f * roadBottomWidth;
        const isSolid = (i === 0 || i === divCount - 1);

        if (isSolid) {
          add(svgEl('line', {
            x1: vanishX, y1: vanishY,
            x2: bx, y2: h,
            stroke: 'rgba(255,255,255,0.8)',
            'stroke-width': 2,
          }));
        } else {
          // Dashed perspective line
          const steps = 30;
          for (let s = 0; s < steps; s++) {
            const t0 = s / steps;
            const t1 = (s + 0.5) / steps;
            const y0 = vanishY + (h - vanishY) * t0;
            const y1 = vanishY + (h - vanishY) * t1;
            const x0 = vanishX + (bx - vanishX) * t0;
            const x1 = vanishX + (bx - vanishX) * t1;
            add(svgEl('line', {
              x1: x0, y1: y0, x2: x1, y2: y1,
              stroke: 'rgba(255,255,255,0.45)',
              'stroke-width': 1.5,
            }));
          }
        }
      }

      // Horizon line glow
      add(svgEl('line', {
        x1: 0, y1: vanishY, x2: w, y2: vanishY,
        stroke: 'rgba(0,200,160,0.15)',
        'stroke-width': 20,
      }));

      return { vanishX, vanishY, roadBottomLeft, roadBottomRight, roadBottomWidth };
    }

    // ── LANE X POSITION ─────────────────────────────────────────────────────────
    function getLaneX(lane, laneCount, roadInfo, yFrac) {
      // yFrac: 0=vanish, 1=bottom
      const { vanishX, roadBottomLeft, roadBottomRight } = roadInfo;
      const roadBottomWidth = roadBottomRight - roadBottomLeft;
      const laneW = roadBottomWidth / laneCount;
      const bx = roadBottomLeft + (lane + 0.5) * laneW;
      return vanishX + (bx - vanishX) * yFrac;
    }

    // ── CAR TRIANGLE ────────────────────────────────────────────────────────────
    function drawCar(cx, cy) {
      const defs = svgEl('defs', {});
      const filter = svgEl('filter', { id: 'carGlow', x: '-50%', y: '-50%', width: '200%', height: '200%' });
      const blur = svgEl('feGaussianBlur', { stdDeviation: '4', result: 'blur' });
      const flood = svgEl('feFlood', { 'flood-color': '#00C8A0', 'flood-opacity': '0.5', result: 'color' });
      const composite = svgEl('feComposite', { in: 'color', in2: 'blur', operator: 'in', result: 'glow' });
      const merge = svgEl('feMerge', {});
      merge.appendChild(svgEl('feMergeNode', { in: 'glow' }));
      merge.appendChild(svgEl('feMergeNode', { in: 'SourceGraphic' }));
      filter.appendChild(blur);
      filter.appendChild(flood);
      filter.appendChild(composite);
      filter.appendChild(merge);
      defs.appendChild(filter);
      add(defs);

      const pts = `${cx},${cy - 16} ${cx - 12},${cy + 10} ${cx + 12},${cy + 10}`;
      add(svgEl('polygon', {
        points: pts,
        fill: '#ffffff',
        filter: 'url(#carGlow)',
      }));
    }

    // ── EXIT RAMP ───────────────────────────────────────────────────────────────
    function drawExitRamp(roadInfo, divergeY) {
      const w = W(), h = H();
      const { vanishX, roadBottomRight, roadBottomWidth, vanishY } = roadInfo;

      // Find where right road edge is at divergeY
      const t = (divergeY - vanishY) / (h - vanishY);
      const rightEdgeAtDiverge = vanishX + (roadBottomRight - vanishX) * t;

      // Ramp curves from rightEdgeAtDiverge to right edge of canvas
      const cp1x = rightEdgeAtDiverge + (w - rightEdgeAtDiverge) * 0.3;
      const cp1y = divergeY + (h - divergeY) * 0.3;
      const endX = w + 10;
      const endY = h * 0.8;

      // Ramp surface
      const rampPath = `M ${rightEdgeAtDiverge} ${divergeY} Q ${cp1x} ${cp1y} ${endX} ${endY}`;
      add(svgEl('path', {
        d: rampPath,
        stroke: '#1a1d22',
        'stroke-width': 38,
        fill: 'none',
        'stroke-linecap': 'butt',
      }));
      // Ramp borders
      add(svgEl('path', {
        d: rampPath,
        stroke: 'rgba(255,255,255,0.5)',
        'stroke-width': 1.5,
        fill: 'none',
        'stroke-dasharray': '8 6',
        'stroke-linecap': 'round',
      }));

      return { rampPath, startX: rightEdgeAtDiverge, startY: divergeY };
    }

    // ── ROUTE PATH ──────────────────────────────────────────────────────────────
    function drawRoutePath(d, color = '#00C8A0', width = 6) {
      const path = svgEl('path', {
        d,
        stroke: color,
        'stroke-width': width,
        fill: 'none',
        'stroke-linecap': 'round',
        'stroke-linejoin': 'round',
      });

      // Animated draw-on
      const len = 600; // approx
      path.style.strokeDasharray = len;
      path.style.strokeDashoffset = len;
      path.style.transition = 'stroke-dashoffset 0.5s ease-out';
      add(path);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => { path.style.strokeDashoffset = '0'; });
      });
    }

    // ── SCHEMATIC INTERSECTION ──────────────────────────────────────────────────
    function drawSchematicIntersection(turnDirection) {
      const w = W(), h = H();
      const cx = w * 0.5;

      // Background
      add(svgEl('rect', { x: 0, y: 0, width: w, height: h, fill: '#0D1018' }));

      // Road widths
      const vRoadW = w * 0.18;
      const hRoadW = h * 0.14;
      const crossY = h * 0.38;

      // Vertical road (approach)
      add(svgEl('rect', {
        x: cx - vRoadW / 2, y: crossY + hRoadW / 2,
        width: vRoadW, height: h - crossY - hRoadW / 2,
        fill: '#111318',
      }));

      // Vertical road above intersection (going straight)
      add(svgEl('rect', {
        x: cx - vRoadW / 2, y: 0,
        width: vRoadW, height: crossY - hRoadW / 2,
        fill: '#111318',
      }));

      // Horizontal road
      add(svgEl('rect', {
        x: 0, y: crossY - hRoadW / 2,
        width: w, height: hRoadW,
        fill: '#111318',
      }));

      // Intersection box
      add(svgEl('rect', {
        x: cx - vRoadW / 2, y: crossY - hRoadW / 2,
        width: vRoadW, height: hRoadW,
        fill: '#111318',
      }));

      // Road edge lines — vertical
      for (const side of [-1, 1]) {
        const ex = cx + side * vRoadW / 2;
        add(svgEl('line', {
          x1: ex, y1: crossY + hRoadW / 2, x2: ex, y2: h,
          stroke: 'rgba(255,255,255,0.6)', 'stroke-width': 1.5,
        }));
        add(svgEl('line', {
          x1: ex, y1: 0, x2: ex, y2: crossY - hRoadW / 2,
          stroke: 'rgba(255,255,255,0.6)', 'stroke-width': 1.5,
        }));
      }

      // Road edge lines — horizontal
      for (const side of [-1, 1]) {
        const ey = crossY + side * hRoadW / 2;
        add(svgEl('line', {
          x1: 0, y1: ey, x2: cx - vRoadW / 2, y2: ey,
          stroke: 'rgba(255,255,255,0.6)', 'stroke-width': 1.5,
        }));
        add(svgEl('line', {
          x1: cx + vRoadW / 2, y1: ey, x2: w, y2: ey,
          stroke: 'rgba(255,255,255,0.6)', 'stroke-width': 1.5,
        }));
      }

      // Center dashed line — vertical approach
      for (let y = crossY + hRoadW / 2 + 10; y < h; y += 28) {
        add(svgEl('line', {
          x1: cx, y1: y, x2: cx, y2: y + 14,
          stroke: 'rgba(255,255,255,0.3)', 'stroke-width': 1.5,
        }));
      }

      // Center dashed line — horizontal
      for (let x = 0; x < cx - vRoadW / 2; x += 28) {
        add(svgEl('line', {
          x1: x, y1: crossY, x2: x + 14, y2: crossY,
          stroke: 'rgba(255,255,255,0.3)', 'stroke-width': 1.5,
        }));
      }
      for (let x = cx + vRoadW / 2; x < w; x += 28) {
        add(svgEl('line', {
          x1: x, y1: crossY, x2: x + 14, y2: crossY,
          stroke: 'rgba(255,255,255,0.3)', 'stroke-width': 1.5,
        }));
      }

      // Stop line
      add(svgEl('line', {
        x1: cx - vRoadW / 2, y1: crossY + hRoadW / 2 + 4,
        x2: cx + vRoadW / 2, y2: crossY + hRoadW / 2 + 4,
        stroke: 'rgba(255,255,255,0.8)', 'stroke-width': 3,
      }));

      // Crosswalk
      const cwY = crossY + hRoadW / 2 + 10;
      for (let xi = 0; xi < 5; xi++) {
        const bx = cx - vRoadW / 2 + 3 + xi * (vRoadW - 6) / 5;
        add(svgEl('rect', {
          x: bx, y: cwY, width: (vRoadW - 6) / 6, height: 8,
          fill: 'rgba(255,255,255,0.25)',
        }));
      }

      // Traffic light
      const tlX = cx + vRoadW / 2 + 10;
      const tlY = crossY - hRoadW / 2 - 30;
      add(svgEl('rect', {
        x: tlX, y: tlY, width: 16, height: 40,
        rx: 4, fill: '#2a2d34',
      }));
      add(svgEl('circle', { cx: tlX + 8, cy: tlY + 10, r: 5, fill: '#cc3333' }));
      add(svgEl('circle', { cx: tlX + 8, cy: tlY + 22, r: 5, fill: '#555' }));
      add(svgEl('circle', { cx: tlX + 8, cy: tlY + 34, r: 5, fill: '#555' }));

      // Car
      const carY = h - 60;
      drawCar(cx, carY);

      // Route path — straight up then curve
      let routeD;
      if (turnDirection === 'right') {
        const endX = cx + vRoadW / 2 + 60;
        routeD = `M ${cx} ${carY - 16} L ${cx} ${crossY} Q ${cx} ${crossY - hRoadW * 0.1} ${cx + vRoadW * 0.5} ${crossY} L ${endX} ${crossY}`;
      } else {
        const endX = cx - vRoadW / 2 - 60;
        routeD = `M ${cx} ${carY - 16} L ${cx} ${crossY} Q ${cx} ${crossY - hRoadW * 0.1} ${cx - vRoadW * 0.5} ${crossY} L ${endX} ${crossY}`;
      }
      drawRoutePath(routeD, '#00C8A0', 5);

      // Turn arrow indicator at intersection
      const arrowCX = cx + (turnDirection === 'right' ? vRoadW * 0.3 : -vRoadW * 0.3);
      const arrowCY = crossY - 10;
      drawTurnArrowSmall(arrowCX, arrowCY, turnDirection);
    }

    function drawTurnArrowSmall(cx, cy, dir) {
      const d = dir === 'right'
        ? `M ${cx - 8} ${cy + 8} L ${cx - 8} ${cy - 2} Q ${cx - 8} ${cy - 10} ${cx} ${cy - 10} L ${cx + 8} ${cy - 10} M ${cx + 4} ${cy - 14} L ${cx + 8} ${cy - 10} L ${cx + 4} ${cy - 6}`
        : `M ${cx + 8} ${cy + 8} L ${cx + 8} ${cy - 2} Q ${cx + 8} ${cy - 10} ${cx} ${cy - 10} L ${cx - 8} ${cy - 10} M ${cx - 4} ${cy - 14} L ${cx - 8} ${cy - 10} L ${cx - 4} ${cy - 6}`;
      add(svgEl('path', {
        d,
        stroke: '#F5A623',
        'stroke-width': 2,
        fill: 'none',
        'stroke-linecap': 'round',
        'stroke-linejoin': 'round',
      }));
    }

    // ── TURN ICON ────────────────────────────────────────────────────────────────
    function drawTurnIcon(type) {
      const container = document.getElementById('turn-icon');
      const ns = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', '0 0 40 40');
      svg.setAttribute('width', '40');
      svg.setAttribute('height', '40');
      svg.setAttribute('fill', 'none');

      const stroke = '#00C8A0';
      const sw = 2.5;
      const common = { stroke, 'stroke-width': sw, fill: 'none', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' };

      let d = '';
      switch (type) {
        case 'straight':
          d = 'M 20 34 L 20 10 M 13 17 L 20 10 L 27 17';
          break;
        case 'lane-right':
          d = 'M 12 34 L 12 18 Q 12 10 20 10 L 28 10 M 22 4 L 28 10 L 22 16';
          break;
        case 'exit-right':
          d = 'M 14 34 L 14 14 M 14 20 Q 14 12 22 12 L 32 12 M 26 6 L 32 12 L 26 18';
          break;
        case 'turn-right':
          d = 'M 14 34 L 14 18 Q 14 8 24 8 L 30 8 M 24 2 L 30 8 L 24 14';
          break;
      }

      const path = document.createElementNS(ns, 'path');
      path.setAttribute('d', d);
      for (const [k, v] of Object.entries(common)) path.setAttribute(k, v);
      svg.appendChild(path);
      container.innerHTML = '';
      container.appendChild(svg);
    }

    // ── RENDER PHASE ────────────────────────────────────────────────────────────
    let currentPhase = 0;

    function renderPhase(n) {
      currentPhase = n;
      const phase = PHASES[n];
      clearScene();

      // Fade-in animation
      scene.classList.remove('phase-enter');
      void scene.offsetWidth; // reflow
      scene.classList.add('phase-enter');
      scene.addEventListener('animationend', () => scene.classList.remove('phase-enter'), { once: true });

      // Header
      updateHeader(phase);

      // Banner
      const banner = document.getElementById('lane-banner');
      if (phase.bannerVisible) {
        banner.style.display = 'block';
        banner.textContent = phase.bannerText || '● Move to right lane';
        banner.style.animation = 'none';
        void banner.offsetWidth;
        banner.style.animation = 'slideDown 0.3s ease-out';
      } else {
        banner.style.display = 'none';
      }

      // Exit sign
      const exitSign = document.getElementById('exit-sign');
      exitSign.style.display = phase.showExitLabel ? 'block' : 'none';

      // Scene
      if (phase.scene === 'perspective-highway') {
        const roadInfo = drawPerspectiveRoad(3, {});
        const w = W(), h = H();
        const vanishY = h * 0.32;
        const carYFrac = 0.75;
        const carY = vanishY + (h - vanishY) * carYFrac;

        // Exit ramp
        if (phase.showExit) {
          const divergeY = vanishY + (h - vanishY) * 0.4;
          const rampInfo = drawExitRamp(roadInfo, divergeY);
        }

        // Route path
        const laneX = getLaneX(phase.carLane, 3, roadInfo, carYFrac);
        const vanishX = w * 0.5;

        if (phase.routePath === 'straight') {
          const d = `M ${laneX} ${carY} L ${vanishX} ${vanishY}`;
          drawRoutePath(d);
        } else if (phase.routePath === 'curving-right') {
          const rightLaneX = getLaneX(2, 3, roadInfo, carYFrac);
          const midX = getLaneX(1.5, 3, roadInfo, 0.5);
          const d = `M ${laneX} ${carY} Q ${midX} ${carY * 0.5 + vanishY * 0.5} ${vanishX} ${vanishY}`;
          drawRoutePath(d);
        } else if (phase.routePath === 'onto-ramp') {
          // Path goes into ramp
          const divergeY = vanishY + (h - vanishY) * 0.4;
          const t = 0.4;
          const rightEdgeX = vanishX + (roadInfo.roadBottomRight - vanishX) * t;
          const endX = W() + 10;
          const endY = h * 0.8;
          const d = `M ${laneX} ${carY} L ${rightEdgeX} ${divergeY} Q ${rightEdgeX + (endX - rightEdgeX) * 0.4} ${divergeY + (endY - divergeY) * 0.4} ${endX} ${endY}`;
          drawRoutePath(d);
        }

        // Car
        drawCar(laneX, carY);

      } else if (phase.scene === 'schematic-intersection') {
        drawSchematicIntersection(phase.turnDirection);
      }

      // Update phase labels
      document.querySelectorAll('#phase-labels span').forEach((el, i) => {
        el.classList.toggle('active', i === n);
      });
    }

    function updateHeader(phase) {
      document.getElementById('instruction-text').textContent = phase.instruction;
      document.getElementById('distance-readout').textContent = phase.distance;
      document.getElementById('eta-time').textContent = phase.etaTime;
      drawTurnIcon(phase.turnIconType);
    }

    // ── SLIDER FILL ─────────────────────────────────────────────────────────────
    const slider = document.getElementById('phase-slider');

    function updateSliderFill(val) {
      const pct = (val / 4) * 100;
      slider.style.background = `linear-gradient(to right, #00C8A0 ${pct}%, rgba(255,255,255,0.15) ${pct}%)`;
    }

    // ── EVENT LISTENERS ─────────────────────────────────────────────────────────
    slider.addEventListener('input', e => {
      const val = parseInt(e.target.value);
      renderPhase(val);
      updateSliderFill(val);
    });

    document.querySelectorAll('#phase-labels span').forEach(el => {
      el.addEventListener('click', () => {
        const p = parseInt(el.dataset.phase);
        slider.value = p;
        renderPhase(p);
        updateSliderFill(p);
      });
    });

    window.addEventListener('resize', () => {
      renderPhase(currentPhase);
    });

    // ── INIT ────────────────────────────────────────────────────────────────────
    renderPhase(0);
    updateSliderFill(0);
  </script>
</body>
</html>
